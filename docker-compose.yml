version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: itender-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: itender
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - itender_postgres_data:/var/lib/postgresql/data

volumes:
  itender_postgres_data:
